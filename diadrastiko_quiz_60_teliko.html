<!doctype html>
<html lang="el">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Διαδραστικό Κουίζ 60 Ερωτήσεων</title>
<style>
:root {
  --bg:#f6f7fb; --card:#fff; --ink:#1f2430; --muted:#667085; --accent:#315f43;
  --ok:#197a38; --bad:#b3261e; --soft:#e8f1eb; --line:#dfe3ea;
}
* { box-sizing:border-box; }
body { margin:0; font-family:system-ui,-apple-system,"Segoe UI",Arial,sans-serif; background:var(--bg); color:var(--ink); }
header { background:linear-gradient(135deg,#315f43,#789875); color:white; padding:28px 18px; }
.wrap { max-width:1000px; margin:0 auto; }
h1 { margin:0 0 6px; font-size:clamp(24px,4vw,38px); }
.subtitle { margin:0; opacity:.95; line-height:1.4; }
.panel { background:var(--card); border:1px solid var(--line); border-radius:18px; padding:18px; margin:18px 0; box-shadow:0 4px 18px rgba(20,30,50,.06); }
.topbar { position:sticky; top:0; z-index:5; background:rgba(246,247,251,.94); backdrop-filter:blur(8px); border-bottom:1px solid var(--line); }
.topbar .wrap { display:flex; gap:12px; align-items:center; padding:10px 18px; flex-wrap:wrap; }
.progress { flex:1; height:12px; border-radius:999px; background:#e2e6ee; overflow:hidden; min-width:180px; }
.progress span { display:block; height:100%; width:0; background:var(--accent); transition:.25s; }
.badge { background:var(--soft); color:#173b25; padding:6px 10px; border-radius:999px; font-weight:800; font-size:14px; }
main { padding:0 18px 32px; }
.sectionTitle { margin:28px 0 10px; color:#315f43; font-size:22px; }
.q { border-left:6px solid var(--accent); }
.qhead { display:flex; justify-content:space-between; gap:12px; align-items:flex-start; }
.qnum { color:var(--muted); font-weight:800; }
.question { font-size:18px; font-weight:780; margin:8px 0 14px; line-height:1.4; }
.options { display:grid; gap:9px; }
label.option { display:flex; gap:10px; align-items:flex-start; background:#fafbfc; border:1px solid var(--line); padding:11px 12px; border-radius:12px; cursor:pointer; }
label.option:hover { border-color:#9eb2a5; }
input[type=text] { width:100%; padding:12px; border:1px solid var(--line); border-radius:12px; font-size:16px; }
select { width:100%; padding:10px; border:1px solid var(--line); border-radius:10px; font-size:15px; background:white; }
.matchrow, .catrow, .orderrow { display:grid; grid-template-columns:1fr 1.4fr; gap:12px; align-items:center; padding:9px 0; border-bottom:1px dashed #e2e5ea; }
.term { font-weight:800; }
.actions { display:flex; gap:8px; flex-wrap:wrap; margin-top:14px; }
button { border:0; background:var(--accent); color:white; padding:10px 14px; border-radius:12px; font-weight:800; cursor:pointer; }
button.secondary { background:#e7ece8; color:#173b25; }
.feedback { margin-top:12px; padding:12px; border-radius:12px; display:none; line-height:1.45; }
.feedback.ok { display:block; background:#eaf6ee; color:#0e5f2a; border:1px solid #b9e1c4; }
.feedback.bad { display:block; background:#fdeeee; color:#8c1d18; border:1px solid #f3c2bd; }
.explain { color:#3d4658; margin-top:4px; }
.scorebox { text-align:center; }
.scorebig { font-size:42px; font-weight:900; color:#315f43; }
.small { color:var(--muted); font-size:14px; }
.hidden { display:none; }
.footerNote { color:#5e6678; font-size:14px; text-align:center; margin-top:22px; }
@media(max-width:650px) { .matchrow,.catrow,.orderrow { grid-template-columns:1fr; } }
</style>
</head>
<body>
<header><div class="wrap">
  <h1>Διαδραστικό Κουίζ 60 Ερωτήσεων</h1>
  <p class="subtitle">Μέτρια δυσκολία</p>
</div></header>
<div class="topbar"><div class="wrap">
  <div class="badge" id="scoreBadge">Σκορ: 0/0</div>
  <div class="progress"><span id="bar"></span></div>
  <button class="secondary" onclick="resetQuiz()">Επανεκκίνηση</button>
</div></div>
<main class="wrap">
  
  <div id="quiz"></div>
  <section class="panel scorebox hidden" id="finalBox">
    <div class="scorebig" id="finalScore"></div>
    <p id="finalMsg"></p>
    <button onclick="resetQuiz()">Ξαναπροσπάθησε</button>
  </section>
  <p class="footerNote">Αυτόνομο HTML αρχείο για χρήση σε browser ή ανάρτηση σε GitHub Pages.</p>
</main>

  if (item.type === 'match') {
    const choices = shuffle(item.pairs.map(p=>p[1]));
    return `<div class="match">` + item.pairs.map((p,j)=>`<div class="matchrow"><div class="term">${esc(p[0])}</div><select id="m${i}_${j}"><option value="">— επίλεξε —</option>${choices.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join('')}</select></div>`).join('') + `</div>`;
  }
  if (item.type === 'categorize') {
    return `<div class="cat">` + item.items.map((p,j)=>`<div class="catrow"><div class="term">${esc(p[0])}</div><select id="c${i}_${j}"><option value="">— κατηγορία —</option>${item.categories.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join('')}</select></div>`).join('') + `</div>`;
  }
  if (item.type === 'order') {
    const nums = item.items.map((_,idx)=>idx+1);
    const scrambled = shuffle(item.items);
    item.scrambled = scrambled;
    return `<div class="order">` + scrambled.map((txt,j)=>`<div class="orderrow"><div class="term">${esc(txt)}</div><select id="o${i}_${j}"><option value="">— θέση —</option>${nums.map(n=>`<option value="${n}">${n}</option>`).join('')}</select></div>`).join('') + `</div><p class="small">Δήλωσε τη θέση κάθε στοιχείου στη σωστή σειρά.</p>`;
  }
}
function getAnswer(item,i) {
  if (item.type === 'mcq') { const el=document.querySelector(`input[name="q${i}"]:checked`); return el?[Number(el.value)]:[]; }
  if (item.type === 'multi') return Array.from(document.querySelectorAll(`input[name="q${i}"]:checked`)).map(x=>Number(x.value)).sort((a,b)=>a-b);
  if (item.type === 'tf') { const el=document.querySelector(`input[name="q${i}"]:checked`); return el ? (el.value==='true') : null; }
  if (item.type === 'cloze') return document.getElementById(`txt${i}`).value;
  if (item.type === 'match') return item.pairs.map((p,j)=>document.getElementById(`m${i}_${j}`).value);
  if (item.type === 'categorize') return item.items.map((p,j)=>document.getElementById(`c${i}_${j}`).value);
  if (item.type === 'order') return item.scrambled.map((txt,j)=>[txt, Number(document.getElementById(`o${i}_${j}`).value)]);
}
function isCorrect(item, ans) {
  if (item.type === 'mcq' || item.type === 'multi') return JSON.stringify(ans) === JSON.stringify([...item.answers].sort((a,b)=>a-b));
  if (item.type === 'tf') return ans === item.answer;
  if (item.type === 'cloze') return item.answers.map(norm).includes(norm(ans));
  if (item.type === 'match') return ans.every((a,j)=>a === item.pairs[j][1]);
  if (item.type === 'categorize') return ans.every((a,j)=>a === item.items[j][1]);
  if (item.type === 'order') {
    return ans.every(([txt,pos]) => item.items.indexOf(txt)+1 === pos);
  }
  return false;
}
function correctText(item) {
  if (item.type === 'mcq' || item.type === 'multi') return item.answers.map(j=>esc(item.options[j])).join(' · ');
  if (item.type === 'tf') return item.answer ? 'Σωστό' : 'Λάθος';
  if (item.type === 'cloze') return esc(item.answers[0]);
  if (item.type === 'match') return item.pairs.map(p=>`${esc(p[0])} → ${esc(p[1])}`).join('<br>');
  if (item.type === 'categorize') return item.items.map(p=>`${esc(p[0])} → ${esc(p[1])}`).join('<br>');
  if (item.type === 'order') return item.items.map((x,j)=>`${j+1}. ${esc(x)}`).join('<br>');
}
function check(i) {
  const item=QUIZ.questions[i], ans=getAnswer(item,i), ok=isCorrect(item,ans);
  answered[i]=true; correct[i]=ok;
  const fb=document.getElementById(`fb${i}`);
  fb.className='feedback '+(ok?'ok':'bad');
  fb.innerHTML = ok ? `Σωστό.<div class="explain">${esc(item.explain)}</div>` : `Όχι ακριβώς. Σωστή απάντηση:<br><b>${correctText(item)}</b><div class="explain">${esc(item.explain)}</div>`;
  document.getElementById(`btn${i}`).textContent='Επανέλεγχος';
  updateBar();
}
function showAnswer(i) {
  const item=QUIZ.questions[i], fb=document.getElementById(`fb${i}`);
  fb.className='feedback ok';
  fb.innerHTML=`Απάντηση:<br><b>${correctText(item)}</b><div class="explain">${esc(item.explain)}</div>`;
}
function updateBar() {
  const done=answered.filter(Boolean).length, score=correct.filter(Boolean).length;
  document.getElementById('scoreBadge').textContent=`Σκορ: ${score}/${done}`;
  document.getElementById('bar').style.width=`${(done/QUIZ.questions.length)*100}%`;
  if (done === QUIZ.questions.length) {
    const pct=Math.round(score/QUIZ.questions.length*100);
    document.getElementById('finalBox').classList.remove('hidden');
    document.getElementById('finalScore').textContent=`${score}/${QUIZ.questions.length} (${pct}%)`;
    document.getElementById('finalMsg').textContent = pct>=85 ? 'Πολύ καλή επίδοση.' : pct>=70 ? 'Καλή επίδοση με λίγη επανάληψη.' : pct>=55 ? 'Μέτρια επίδοση· χρειάζεται στοχευμένη επανάληψη.' : 'Χρειάζεται επανάληψη των βασικών εννοιών.';
  }
}
function resetQuiz() {
  answered.fill(false); correct.fill(false);
  document.getElementById('finalBox').classList.add('hidden');
  render(); window.scrollTo({top:0, behavior:'smooth'});
}
render();
</script>
